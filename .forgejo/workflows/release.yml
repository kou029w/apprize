# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: release
on:
  push:
    tags:
      - "v*"
jobs:
  forgejo:
    runs-on: self-hosted
    steps:
      - run: apk add nodejs
      - uses: https://github.com/actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: https://github.com/actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: https://github.com/goreleaser/goreleaser-action@v7
        with:
          args: release --clean
        env:
          GORELEASER_FORCE_TOKEN: gitea
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
  docker:
    runs-on: self-hosted
    steps:
      - run: apk add nodejs
      - uses: https://github.com/actions/checkout@v6
      - uses: https://github.com/docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: https://github.com/docker/metadata-action@v6
        id: meta
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/apprize
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
      - uses: https://github.com/docker/build-push-action@v7
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
