# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
gitea_urls:
  api: https://git.fogtype.com/api/v1
  download: https://git.fogtype.com
builds:
  - id: apprize
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
    flags:
      - -trimpath
    env:
      - CGO_ENABLED=0
kos:
  - id: apprize
    build: apprize
    bare: true
    platforms:
      - linux/amd64
      - linux/arm64
    tags:
      - "{{ .Version }}"
      - "{{ .Major }}.{{ .Minor }}"
      - "{{ .Major }}"
      - latest
